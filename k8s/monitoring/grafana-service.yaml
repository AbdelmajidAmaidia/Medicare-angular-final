apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  selector:
    app: grafana
  # NodePort exposes Grafana directly on each node at port 30300
  # (accessible even without an Ingress controller).
  # Change type to ClusterIP and remove nodePort if you use an Ingress instead.
  type: NodePort
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30300
      protocol: TCP
