name: CI/CD Pipeline – Medicare Frontend

on:
  push:
    # 'develop' triggers only the build-and-test job (CI).
    # Docker build & push runs exclusively on main/master (see docker job condition).
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  NODE_VERSION: '20'
  IMAGE_NAME: medicare-frontend

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1 – Install dependencies, run tests, build the production bundle
  # ──────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Run Karma/Jasmine tests with ChromeHeadless (no GUI needed in CI)
      - name: Run unit tests
        run: npm run test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Build production bundle
        run: npm run build -- --configuration production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-medicare-angular
          path: dist/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2 – Build Docker image and push to Docker Hub
  #          Runs only on push to main / master (not on PRs)
  # ──────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build-and-test
    permissions:
      contents: read
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Requires the following repository secrets:
      #   DOCKERHUB_USERNAME – your Docker Hub username
      #   DOCKERHUB_TOKEN    – a Docker Hub access token (not your password)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Automatically derive image tags from the branch name and commit SHA
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Reuse cached layers between workflow runs (speeds up builds)
          cache-from: type=gha
          cache-to: type=gha,mode=max
