<p>toast-container works!</p>
<div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1080;">
  <div
    class="toast show mb-2"
    role="alert"
    aria-live="assertive"
    aria-atomic="true"
    *ngFor="let t of (toastService.toasts$ | async)"
    [class.text-bg-success]="t.type === 'success'"
    [class.text-bg-info]="t.type === 'info'"
    [class.text-bg-warning]="t.type === 'warning'"
    [class.text-bg-danger]="t.type === 'danger'"
  >
    <div class="toast-header">
      <strong class="me-auto">{{ t.title || 'Notification' }}</strong>
      <button type="button" class="btn-close" aria-label="Close" (click)="toastService.dismiss(t.id)"></button>
    </div>
    <div class="toast-body">
      {{ t.message }}
    </div>
  </div>
</div>
