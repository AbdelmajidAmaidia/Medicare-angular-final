<div>
  <h2>Lab Result Entry</h2>
  <form (ngSubmit)="submitResult()">
    <div>
      <label>Select Test</label>
      <select [(ngModel)]="selectedTest" name="selectedTest">
        <option value="">Select a test</option>
        <option *ngFor="let t of pendingTests" [value]="t.id">{{ t.id }} – {{ t.patient }} – {{ t.test }}</option>
      </select>
    </div>
    <div>
      <label>Result Value</label>
      <input type="text" [(ngModel)]="resultValue" name="resultValue" placeholder="Enter result">
    </div>
    <div>
      <label>Notes</label>
      <textarea [(ngModel)]="notes" name="notes" rows="3"></textarea>
    </div>
    <button type="submit">Submit Result</button>
  </form>
  <h3>Pending Tests</h3>
  <table>
    <thead><tr><th>ID</th><th>Patient</th><th>Test</th><th>Status</th></tr></thead>
    <tbody>
      <tr *ngFor="let t of pendingTests">
        <td>{{ t.id }}</td><td>{{ t.patient }}</td><td>{{ t.test }}</td><td>{{ t.status }}</td>
      </tr>
    </tbody>
  </table>
</div>
