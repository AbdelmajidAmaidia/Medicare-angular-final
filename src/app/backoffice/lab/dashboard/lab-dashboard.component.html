<div>
  <h2>Lab Dashboard</h2>
  <ul>
    <li *ngFor="let s of stats"><strong>{{ s.value }}</strong> {{ s.label }}</li>
  </ul>
  <h3>Pending Tests</h3>
  <table>
    <thead><tr><th>ID</th><th>Patient</th><th>Test</th><th>Priority</th><th>Received</th></tr></thead>
    <tbody>
      <tr *ngFor="let t of pendingTests">
        <td>{{ t.id }}</td><td>{{ t.patient }}</td><td>{{ t.test }}</td><td>{{ t.priority }}</td><td>{{ t.received }}</td>
      </tr>
    </tbody>
  </table>
</div>
