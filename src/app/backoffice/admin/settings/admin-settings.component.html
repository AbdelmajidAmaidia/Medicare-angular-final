<!-- src/app/backoffice/admin/settings/admin-settings.component.html -->
<div class="page-container" style="max-width:720px">
  <div class="page-header mb-4">
    <h1 class="page-title">Paramètres de la Plateforme</h1>
    <p class="page-subtitle">Configurez les paramètres généraux du système MediCare.</p>
  </div>

  <div class="panel p-4">
    <div *ngIf="saved" class="alert alert-success d-flex align-items-center gap-2 mb-4">
      <i class="bi bi-check-circle-fill"></i>
      Paramètres sauvegardés avec succès !
    </div>

    <form (ngSubmit)="saveSettings()" #settingsForm="ngForm" novalidate>

      <div class="mb-3">
        <label class="form-label fw-semibold">Nom de la Plateforme</label>
        <input class="form-control" [(ngModel)]="platformName" name="platformName" required />
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Email de Support</label>
        <input type="email" class="form-control" [(ngModel)]="supportEmail" name="supportEmail" required />
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Max Rendez-vous / Jour</label>
        <input type="number" class="form-control" [(ngModel)]="maxAppointmentsPerDay" name="maxAppt" min="1" max="500" />
      </div>

      <div class="mb-3 d-flex align-items-center gap-3">
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" role="switch" id="maintenanceSwitch"
                 [(ngModel)]="maintenanceMode" name="maintenance" />
          <label class="form-check-label" for="maintenanceSwitch">Mode Maintenance</label>
        </div>
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" role="switch" id="registrationSwitch"
                 [(ngModel)]="allowRegistrations" name="registrations" />
          <label class="form-check-label" for="registrationSwitch">Autoriser les inscriptions</label>
        </div>
      </div>

      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-primary">
          <i class="bi bi-floppy"></i> Sauvegarder
        </button>
        <button type="button" class="btn btn-outline-secondary">
          <i class="bi bi-x-circle"></i> Annuler
        </button>
      </div>
    </form>
  </div>
</div>
