<div>
  <h2>System Overview</h2>
  <ul>
    <li *ngFor="let s of stats"><strong>{{ s.value }}</strong> {{ s.label }}</li>
  </ul>
  <h3>Recent Alerts</h3>
  <ul>
    <li *ngFor="let a of recentAlerts">
      <strong>[{{ a.type | uppercase }}]</strong> {{ a.message }} – {{ a.time }}
    </li>
  </ul>
</div>
