<div>
  <h2>My Schedule</h2>
  <table>
    <thead><tr><th>Time</th><th>Patient</th><th>Type</th><th>Duration</th><th>Status</th></tr></thead>
    <tbody>
      <tr *ngFor="let s of schedule">
        <td>{{ s.time }}</td><td>{{ s.patient }}</td><td>{{ s.type }}</td><td>{{ s.duration }}</td><td>{{ s.status }}</td>
      </tr>
    </tbody>
  </table>
</div>
