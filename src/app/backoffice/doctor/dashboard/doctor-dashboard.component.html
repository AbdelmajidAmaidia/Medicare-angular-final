<div>
  <h2>Doctor Dashboard</h2>
  <section>
    <ul>
      <li *ngFor="let s of stats"><strong>{{ s.value }}</strong> {{ s.label }}</li>
    </ul>
  </section>
  <section>
    <h3>Today's Appointments</h3>
    <table>
      <thead><tr><th>Patient</th><th>Age</th><th>Type</th><th>Time</th><th>Status</th></tr></thead>
      <tbody>
        <tr *ngFor="let a of todayAppointments">
          <td>{{ a.patient }}</td><td>{{ a.age }}</td><td>{{ a.type }}</td><td>{{ a.time }}</td><td>{{ a.status }}</td>
        </tr>
      </tbody>
    </table>
  </section>
</div>
