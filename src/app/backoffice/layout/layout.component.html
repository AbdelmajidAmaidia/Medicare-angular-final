<!-- src/app/backoffice/layout/layout.component.html -->
<div class="backoffice-wrapper d-flex">
  <!-- Sidebar -->
  <nav class="sidebar bg-white shadow-sm" [class.collapsed]="sidebarCollapsed">
    <div class="sidebar-header p-3 border-bottom">
      <div class="d-flex align-items-center">
        <i class="bi bi-heart-pulse-fill text-primary fs-3 me-2"></i>
        <span class="sidebar-title fw-bold text-primary" [class.d-none]="sidebarCollapsed">MediCare AI</span>
      </div>
    </div>
    
    <div class="sidebar-body p-3">
      <!-- User Info -->
      <div class="user-info mb-4" [class.text-center]="sidebarCollapsed">
        <div class="avatar bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-2" style="width: 48px; height: 48px;">
          <i class="bi bi-person-fill fs-5"></i>
        </div>
        <div *ngIf="!sidebarCollapsed">
          <div class="fw-semibold">Dr. {{ userName }}</div>
          <small class="text-secondary">{{ userRole | titlecase }}</small>
        </div>
      </div>
      
      <!-- Navigation Menu -->
      <ul class="nav nav-pills flex-column">
        <li class="nav-item mb-1" *ngFor="let item of navigationItems">
          <a [routerLink]="item.route" 
             class="nav-link d-flex align-items-center text-dark"
             routerLinkActive="active bg-primary text-white"
             [title]="sidebarCollapsed ? item.label : ''">
            <i [class]="item.icon" class="me-3"></i>
            <span [class.d-none]="sidebarCollapsed">{{ item.label }}</span>
          </a>
        </li>
      </ul>
    </div>
    
    <!-- Sidebar Footer -->
    <div class="sidebar-footer p-3 border-top mt-auto">
      <button class="btn btn-outline-primary w-100 d-flex align-items-center justify-content-center" 
              (click)="logout()"
              [title]="sidebarCollapsed ? 'Déconnexion' : ''">
        <i class="bi bi-box-arrow-right me-2" [class.me-0]="sidebarCollapsed"></i>
        <span [class.d-none]="sidebarCollapsed">Déconnexion</span>
      </button>
    </div>
  </nav>
  
  <!-- Main Content -->
  <main class="main-content flex-grow-1 d-flex flex-column">
    <!-- Top Header -->
    <header class="top-header bg-white shadow-sm p-3 d-flex align-items-center justify-content-between">
      <div class="d-flex align-items-center">
        <button class="btn btn-outline-primary me-3" (click)="toggleSidebar()">
          <i class="bi bi-list"></i>
        </button>
        <h1 class="h4 mb-0 text-primary">{{ pageTitle }}</h1>
      </div>
      
      <div class="d-flex align-items-center gap-3">
        <!-- Notifications -->
        <div class="dropdown">
          <button class="btn btn-outline-primary position-relative" data-bs-toggle="dropdown">
            <i class="bi bi-bell"></i>
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
              3
            </span>
          </button>
          <div class="dropdown-menu dropdown-menu-end">
            <h6 class="dropdown-header">Notifications</h6>
            <a class="dropdown-item" href="#">
              <i class="bi bi-calendar-event text-info me-2"></i>
              Nouveau rendez-vous demain
            </a>
            <a class="dropdown-item" href="#">
              <i class="bi bi-file-medical text-success me-2"></i>
              Résultats d'analyse disponibles
            </a>
          </div>
        </div>
        
        <!-- Quick Actions -->
        <button class="btn btn-primary">
          <i class="bi bi-plus-lg me-1"></i>Nouveau
        </button>
      </div>
    </header>
    
    <!-- Page Content -->
    <div class="page-content flex-grow-1 p-4 bg-light">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
