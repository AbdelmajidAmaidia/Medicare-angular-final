<div>
  <h2>Pharmacy Wallet</h2>
  <p>Balance: ${{ balance }}</p>
  <p>Pending Payout: ${{ pendingPayout }}</p>
  <h3>Transactions</h3>
  <table>
    <thead><tr><th>Date</th><th>Description</th><th>Type</th><th>Amount</th><th>Balance</th></tr></thead>
    <tbody>
      <tr *ngFor="let t of transactions">
        <td>{{ t.date }}</td><td>{{ t.description }}</td><td>{{ t.type }}</td><td>{{ t.amount }}</td><td>{{ t.balance }}</td>
      </tr>
    </tbody>
  </table>
</div>
