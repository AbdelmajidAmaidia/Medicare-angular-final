<div>
  <h2>Pharmacy Dashboard</h2>
  <ul>
    <li *ngFor="let s of stats"><strong>{{ s.value }}</strong> {{ s.label }}</li>
  </ul>
  <h3>Recent Orders</h3>
  <table>
    <thead><tr><th>Order ID</th><th>Patient</th><th>Items</th><th>Time</th><th>Status</th></tr></thead>
    <tbody>
      <tr *ngFor="let o of recentOrders">
        <td>{{ o.id }}</td><td>{{ o.patient }}</td><td>{{ o.items }}</td><td>{{ o.time }}</td><td>{{ o.status }}</td>
      </tr>
    </tbody>
  </table>
</div>
