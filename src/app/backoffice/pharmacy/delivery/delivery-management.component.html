<div>
  <h2>Delivery Management</h2>
  <table>
    <thead><tr><th>ID</th><th>Patient</th><th>Address</th><th>Medications</th><th>Rider</th><th>Dispatch</th><th>ETA</th><th>Status</th></tr></thead>
    <tbody>
      <tr *ngFor="let d of deliveries">
        <td>{{ d.id }}</td><td>{{ d.patient }}</td><td>{{ d.address }}</td><td>{{ d.medications }}</td>
        <td>{{ d.rider }}</td><td>{{ d.dispatchTime }}</td><td>{{ d.eta }}</td><td>{{ d.status }}</td>
      </tr>
    </tbody>
  </table>
</div>
