<div>
  <h2>AI Health Assistant</h2>
  <div>
    <div *ngFor="let m of messages">
      <strong>{{ m.role === 'ai' ? 'AI Assistant' : 'You' }}:</strong>
      <span>{{ m.text }}</span>
    </div>
  </div>
  <form (ngSubmit)="sendMessage()">
    <input type="text" [(ngModel)]="userInput" name="userInput" placeholder="Type your health question...">
    <button type="submit">Send</button>
  </form>
</div>
