<div>
  <h2>Prescriptions</h2>
  <table>
    <thead>
      <tr><th>ID</th><th>Medication</th><th>Dosage</th><th>Prescribed By</th><th>Date</th><th>Refills</th><th>Status</th></tr>
    </thead>
    <tbody>
      <tr *ngFor="let p of prescriptions">
        <td>{{ p.id }}</td>
        <td>{{ p.medication }}</td>
        <td>{{ p.dosage }}</td>
        <td>{{ p.prescribedBy }}</td>
        <td>{{ p.date }}</td>
        <td>{{ p.refills }}</td>
        <td>{{ p.status }}</td>
      </tr>
    </tbody>
  </table>
</div>
