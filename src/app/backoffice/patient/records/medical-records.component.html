<div>
  <h2>Medical Records</h2>
  <table>
    <thead>
      <tr><th>Date</th><th>Type</th><th>Doctor</th><th>Description</th><th>Status</th></tr>
    </thead>
    <tbody>
      <tr *ngFor="let r of records">
        <td>{{ r.date }}</td>
        <td>{{ r.type }}</td>
        <td>{{ r.doctor }}</td>
        <td>{{ r.description }}</td>
        <td>{{ r.status }}</td>
      </tr>
    </tbody>
  </table>
</div>
